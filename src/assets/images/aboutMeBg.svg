<svg width="100%" viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <!-- sage green background with brushstroke texture -->
  <rect width="1200" height="675" fill="#c8d9a8"/>
  <rect x="0" y="0" width="1200" height="675" fill="#b8cc90" opacity="0.3"/>
  <!-- brushstroke patches -->
  <ellipse cx="200" cy="300" rx="180" ry="120" fill="#a8c078" opacity="0.25"/>
  <ellipse cx="500" cy="420" rx="250" ry="100" fill="#90b060" opacity="0.2"/>
  <ellipse cx="150" cy="500" rx="200" ry="80" fill="#d8e8b8" opacity="0.35"/>
  <ellipse cx="700" cy="200" rx="300" ry="150" fill="#d0e0a0" opacity="0.2"/>
  <ellipse cx="900" cy="480" rx="200" ry="120" fill="#88a858" opacity="0.2"/>
  <ellipse cx="400" cy="150" rx="220" ry="90" fill="#e0ecc0" opacity="0.25"/>

  <!-- stems -->
  <line x1="820" y1="675" x2="810" y2="480" stroke="#5a7a35" stroke-width="3" stroke-linecap="round"/>
  <line x1="860" y1="675" x2="870" y2="440" stroke="#4e6e2e" stroke-width="3" stroke-linecap="round"/>
  <line x1="900" y1="675" x2="920" y2="420" stroke="#5a7a35" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="940" y1="675" x2="960" y2="390" stroke="#4e6e2e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="980" y1="675" x2="1000" y2="370" stroke="#5a7a35" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1020" y1="675" x2="1050" y2="340" stroke="#4e6e2e" stroke-width="3" stroke-linecap="round"/>
  <line x1="1060" y1="675" x2="1090" y2="310" stroke="#5a7a35" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1100" y1="675" x2="1120" y2="360" stroke="#4e6e2e" stroke-width="3" stroke-linecap="round"/>
  <line x1="1140" y1="675" x2="1150" y2="420" stroke="#5a7a35" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="850" y1="600" x2="800" y2="520" stroke="#5a7a35" stroke-width="2" stroke-linecap="round"/>

  <!-- leaves -->
  <ellipse cx="835" cy="570" rx="18" ry="8" fill="#4e7030" transform="rotate(-40 835 570)"/>
  <ellipse cx="880" cy="540" rx="16" ry="7" fill="#5a7a35" transform="rotate(30 880 540)"/>
  <ellipse cx="930" cy="510" rx="18" ry="7" fill="#4e7030" transform="rotate(-35 930 510)"/>
  <ellipse cx="975" cy="490" rx="15" ry="6" fill="#5a7a35" transform="rotate(40 975 490)"/>
  <ellipse cx="1025" cy="460" rx="17" ry="7" fill="#4e7030" transform="rotate(-30 1025 460)"/>
  <ellipse cx="1070" cy="430" rx="16" ry="6" fill="#5a7a35" transform="rotate(35 1070 430)"/>

  <!-- daisy macro: petals then center -->
  <!-- daisy 1 - large, bottom right center -->
  <g transform="translate(1050,340)">
    <ellipse cx="0" cy="-26" rx="8" ry="18" fill="white" opacity="0.95" transform="rotate(0)"/>
    <ellipse cx="0" cy="-26" rx="8" ry="18" fill="white" opacity="0.95" transform="rotate(40)"/>
    <ellipse cx="0" cy="-26" rx="8" ry="18" fill="white" opacity="0.95" transform="rotate(80)"/>
    <ellipse cx="0" cy="-26" rx="8" ry="18" fill="white" opacity="0.95" transform="rotate(120)"/>
    <ellipse cx="0" cy="-26" rx="8" ry="18" fill="white" opacity="0.95" transform="rotate(160)"/>
    <ellipse cx="0" cy="-26" rx="8" ry="18" fill="white" opacity="0.95" transform="rotate(200)"/>
    <ellipse cx="0" cy="-26" rx="8" ry="18" fill="white" opacity="0.95" transform="rotate(240)"/>
    <ellipse cx="0" cy="-26" rx="8" ry="18" fill="white" opacity="0.95" transform="rotate(280)"/>
    <ellipse cx="0" cy="-26" rx="8" ry="18" fill="white" opacity="0.95" transform="rotate(320)"/>
    <circle cx="0" cy="0" r="16" fill="#e8c030"/>
    <circle cx="0" cy="0" r="10" fill="#d4a820"/>
  </g>

  <!-- daisy 2 -->
  <g transform="translate(960,390)">
    <ellipse cx="0" cy="-22" rx="7" ry="16" fill="white" opacity="0.95" transform="rotate(0)"/>
    <ellipse cx="0" cy="-22" rx="7" ry="16" fill="white" opacity="0.95" transform="rotate(40)"/>
    <ellipse cx="0" cy="-22" rx="7" ry="16" fill="white" opacity="0.95" transform="rotate(80)"/>
    <ellipse cx="0" cy="-22" rx="7" ry="16" fill="white" opacity="0.95" transform="rotate(120)"/>
    <ellipse cx="0" cy="-22" rx="7" ry="16" fill="white" opacity="0.95" transform="rotate(160)"/>
    <ellipse cx="0" cy="-22" rx="7" ry="16" fill="white" opacity="0.95" transform="rotate(200)"/>
    <ellipse cx="0" cy="-22" rx="7" ry="16" fill="white" opacity="0.95" transform="rotate(240)"/>
    <ellipse cx="0" cy="-22" rx="7" ry="16" fill="white" opacity="0.95" transform="rotate(280)"/>
    <ellipse cx="0" cy="-22" rx="7" ry="16" fill="white" opacity="0.95" transform="rotate(320)"/>
    <circle cx="0" cy="0" r="13" fill="#e8c030"/>
    <circle cx="0" cy="0" r="8" fill="#d4a820"/>
  </g>

  <!-- daisy 3 -->
  <g transform="translate(1110,320)">
    <ellipse cx="0" cy="-20" rx="7" ry="15" fill="white" opacity="0.95" transform="rotate(0)"/>
    <ellipse cx="0" cy="-20" rx="7" ry="15" fill="white" opacity="0.95" transform="rotate(40)"/>
    <ellipse cx="0" cy="-20" rx="7" ry="15" fill="white" opacity="0.95" transform="rotate(80)"/>
    <ellipse cx="0" cy="-20" rx="7" ry="15" fill="white" opacity="0.95" transform="rotate(120)"/>
    <ellipse cx="0" cy="-20" rx="7" ry="15" fill="white" opacity="0.95" transform="rotate(160)"/>
    <ellipse cx="0" cy="-20" rx="7" ry="15" fill="white" opacity="0.95" transform="rotate(200)"/>
    <ellipse cx="0" cy="-20" rx="7" ry="15" fill="white" opacity="0.95" transform="rotate(240)"/>
    <ellipse cx="0" cy="-20" rx="7" ry="15" fill="white" opacity="0.95" transform="rotate(280)"/>
    <ellipse cx="0" cy="-20" rx="7" ry="15" fill="white" opacity="0.95" transform="rotate(320)"/>
    <circle cx="0" cy="0" r="12" fill="#e8c030"/>
    <circle cx="0" cy="0" r="7" fill="#d4a820"/>
  </g>

  <!-- daisy 4 - tilted -->
  <g transform="translate(880,450) rotate(-15)">
    <ellipse cx="0" cy="-20" rx="6" ry="15" fill="white" opacity="0.95" transform="rotate(0)"/>
    <ellipse cx="0" cy="-20" rx="6" ry="15" fill="white" opacity="0.95" transform="rotate(40)"/>
    <ellipse cx="0" cy="-20" rx="6" ry="15" fill="white" opacity="0.95" transform="rotate(80)"/>
    <ellipse cx="0" cy="-20" rx="6" ry="15" fill="white" opacity="0.95" transform="rotate(120)"/>
    <ellipse cx="0" cy="-20" rx="6" ry="15" fill="white" opacity="0.95" transform="rotate(160)"/>
    <ellipse cx="0" cy="-20" rx="6" ry="15" fill="white" opacity="0.95" transform="rotate(200)"/>
    <ellipse cx="0" cy="-20" rx="6" ry="15" fill="white" opacity="0.95" transform="rotate(240)"/>
    <ellipse cx="0" cy="-20" rx="6" ry="15" fill="white" opacity="0.95" transform="rotate(280)"/>
    <ellipse cx="0" cy="-20" rx="6" ry="15" fill="white" opacity="0.95" transform="rotate(320)"/>
    <circle cx="0" cy="0" r="12" fill="#e8c030"/>
    <circle cx="0" cy="0" r="7" fill="#d4a820"/>
  </g>

  <!-- daisy 5 - small bud area -->
  <g transform="translate(1000,370) rotate(10)">
    <ellipse cx="0" cy="-18" rx="6" ry="13" fill="white" opacity="0.9" transform="rotate(0)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="13" fill="white" opacity="0.9" transform="rotate(45)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="13" fill="white" opacity="0.9" transform="rotate(90)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="13" fill="white" opacity="0.9" transform="rotate(135)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="13" fill="white" opacity="0.9" transform="rotate(180)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="13" fill="white" opacity="0.9" transform="rotate(225)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="13" fill="white" opacity="0.9" transform="rotate(270)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="13" fill="white" opacity="0.9" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="11" fill="#e8c030"/>
    <circle cx="0" cy="0" r="6" fill="#d4a820"/>
  </g>

  <!-- daisy 6 top right -->
  <g transform="translate(1150,370) rotate(-10)">
    <ellipse cx="0" cy="-18" rx="6" ry="14" fill="white" opacity="0.9" transform="rotate(0)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="14" fill="white" opacity="0.9" transform="rotate(40)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="14" fill="white" opacity="0.9" transform="rotate(80)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="14" fill="white" opacity="0.9" transform="rotate(120)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="14" fill="white" opacity="0.9" transform="rotate(160)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="14" fill="white" opacity="0.9" transform="rotate(200)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="14" fill="white" opacity="0.9" transform="rotate(240)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="14" fill="white" opacity="0.9" transform="rotate(280)"/>
    <ellipse cx="0" cy="-18" rx="6" ry="14" fill="white" opacity="0.9" transform="rotate(320)"/>
    <circle cx="0" cy="0" r="11" fill="#e8c030"/>
    <circle cx="0" cy="0" r="6" fill="#d4a820"/>
  </g>

  <!-- small buds -->
  <circle cx="840" cy="510" r="5" fill="#88a858"/>
  <circle cx="912" cy="430" r="4" fill="#88a858"/>
  <circle cx="1075" cy="400" r="4" fill="#88a858"/>

  <!-- scattered petals -->
  <ellipse cx="780" cy="490" rx="5" ry="9" fill="white" opacity="0.6" transform="rotate(30 780 490)"/>
  <ellipse cx="760" cy="440" rx="4" ry="7" fill="white" opacity="0.5" transform="rotate(-20 760 440)"/>
  <ellipse cx="820" cy="380" rx="4" ry="7" fill="white" opacity="0.45" transform="rotate(50 820 380)"/>
</svg>
